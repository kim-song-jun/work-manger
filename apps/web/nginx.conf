map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 4444;
  server_name _;
  root /usr/share/nginx/html;

  # WebSocket → daphne (must come before /v1/ to win on prefix match)
  location /v1/ws/ {
    proxy_pass http://ws:4456;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # ntfy (Android push transport) — proxy to the internal ntfy service.
  # Strips the /v1/ntfy/ prefix so the Android client can subscribe to
  # /v1/ntfy/wm-prod-membership-{id}/ws and the upstream sees /<topic>/ws.
  # See ADR-006 + docs/operations/operations-guide.md §5.4.
  location /v1/ntfy/ {
    proxy_pass http://ntfy:80/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Long-lived stream subscriptions (/{topic}/ws, /{topic}/sse).
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  location /v1/ {
    proxy_pass http://api:4455;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri /index.html;
  }
}
