name: work_manager_mobile
description: Flutter WebView shell that hosts the work-manager React SPA and bridges native capabilities (GPS, ntfy push, haptics, device-token registration).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView host
  flutter_inappwebview: ^6.1.5

  # Geolocation (clock-in / geofencing)
  geolocator: ^13.0.0
  geolocator_platform_interface: ^4.2.4

  # Self-hosted push transports (no Firebase) — see ADR-006.
  # Android: ntfy via WebSocket. iOS: APNs registered via the standard
  # UIApplication delegate (token forwarded through the JS bridge).
  flutter_local_notifications: ^17.2.3
  web_socket_channel: ^3.0.0

  # Permission UX
  permission_handler: ^11.3.1

  # Device / build metadata exposed via NativeBridge.appInfo
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.2

  # Persisted bridge state (e.g. last-known device token)
  shared_preferences: ^2.3.2

  # Background tasks + geofencing (lib/geofence/geofence_service.dart).
  # NOTE: enabling these triggers Apple App Review extra scrutiny — the
  # Info.plist purpose strings + an in-app explainer screen are required.
  flutter_workmanager: ^0.5.2
  geofence_service: ^5.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
