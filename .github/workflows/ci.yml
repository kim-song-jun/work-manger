name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (django + pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            services/api/requirements.txt
            services/api/requirements-dev.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Postgres + Redis (compose)
        run: |
          docker compose up -d db redis
          # Wait for healthchecks
          for i in {1..30}; do
            db_ok=$(docker inspect --format='{{.State.Health.Status}}' wm-db 2>/dev/null || echo starting)
            redis_ok=$(docker inspect --format='{{.State.Health.Status}}' wm-redis 2>/dev/null || echo starting)
            if [ "$db_ok" = "healthy" ] && [ "$redis_ok" = "healthy" ]; then
              echo "db + redis healthy"; break
            fi
            echo "waiting for db ($db_ok) + redis ($redis_ok)..."
            sleep 2
          done

      - name: Install Python deps
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run pytest with coverage
        working-directory: services/api
        env:
          DJANGO_SETTINGS_MODULE: work_manager.settings.test
          DATABASE_URL: postgres://wm:wm@localhost:5432/work_manager
          REDIS_URL: redis://localhost:6379/1
          DJANGO_SECRET_KEY: ci-insecure-key
        run: |
          # Expose db/redis to the host for pytest by re-publishing via socat,
          # OR rely on settings.test using sqlite in-memory. We try real PG first
          # via published port; if compose did not publish, settings.test should
          # fall back gracefully.
          pytest --ds=work_manager.settings.test \
                 --cov=apps --cov=core \
                 --cov-fail-under=50 \
                 --cov-report=xml --cov-report=term-missing

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: services/api/coverage.xml
          if-no-files-found: ignore
          retention-days: 7

  codegen-check:
    name: Codegen Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17 (openapi-generator-cli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: Boot API for schema fetch
        run: |
          docker compose up -d db redis api
          timeout 60 bash -c 'until curl -sf http://localhost:4455/v1/health; do sleep 2; done'

      - name: Install Flutter dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Run codegen + drift check
        env:
          VITE_API_URL: http://localhost:4455
        run: make codegen-check

  frontend:
    name: frontend (vite + vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install deps
        working-directory: apps/web
        run: npm ci --legacy-peer-deps

      - name: Set up Docker Buildx (for OpenAPI types drift check)
        uses: docker/setup-buildx-action@v3

      - name: Bring up API for OpenAPI schema
        # The schema source lives in drf-spectacular (architecture.md §4.3).
        # We boot db + redis + api just long enough to fetch /v1/schema/.
        run: |
          docker compose up -d --build db redis api
          for i in {1..60}; do
            s=$(docker inspect --format='{{.State.Health.Status}}' wm-api 2>/dev/null || echo starting)
            if [ "$s" = "healthy" ]; then echo "api healthy"; break; fi
            echo "waiting for api ($s)..."
            sleep 3
          done

      - name: OpenAPI types drift check
        working-directory: apps/web
        # Regenerates openapi-types.ts into a temp file from the live drf-spectacular
        # schema. If the committed file is out of sync the job fails — run
        # `npm run types:gen` locally and commit the diff.
        env:
          VITE_API_URL: http://localhost:4455
        run: npm run types:check

      - name: Tear down OpenAPI stack
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Unit tests with coverage
        working-directory: apps/web
        run: npm run test -- --coverage

      - name: Build
        working-directory: apps/web
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage
          if-no-files-found: ignore
          retention-days: 7

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Bring up the full stack
        run: |
          docker compose up -d --build db redis api ws worker beat web
          # Wait for api health
          for i in {1..60}; do
            s=$(docker inspect --format='{{.State.Health.Status}}' wm-api 2>/dev/null || echo starting)
            if [ "$s" = "healthy" ]; then echo "api healthy"; break; fi
            echo "waiting for api ($s)..."
            sleep 3
          done
          # Web has no healthcheck — probe its port
          for i in {1..30}; do
            if curl -fsS -o /dev/null http://localhost:4444; then echo "web reachable"; break; fi
            echo "waiting for web..."
            sleep 2
          done

      - name: Seed demo dataset
        run: docker compose --profile seed run --rm seed

      - name: Run Playwright suite
        env:
          WM_E2E_RETRIES: "2"
        run: docker compose --profile e2e run --rm -e WM_E2E_RETRIES=$WM_E2E_RETRIES e2e

      - name: Upload Playwright HTML report + traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/e2e/playwright-report
            apps/e2e/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose ps
          mkdir -p apps/e2e/_logs
          docker compose logs --no-color --tail=800 api ws web > apps/e2e/_logs/api-ws-web.log 2>&1 || true
          docker compose logs --no-color --tail=400 worker beat db redis > apps/e2e/_logs/workers-infra.log 2>&1 || true
          tail -n 200 apps/e2e/_logs/api-ws-web.log || true

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-container-logs
          path: apps/e2e/_logs
          if-no-files-found: ignore
          retention-days: 14

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  infrastructure:
    name: infrastructure (terraform fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: terraform fmt -check -recursive
        run: terraform fmt -check -recursive infra/terraform

      - name: terraform init + validate (per env, no backend)
        working-directory: infra/terraform
        run: |
          set -e
          for env_dir in envs/*/; do
            echo "==> ${env_dir}"
            (
              cd "${env_dir}"
              terraform init -backend=false -input=false -no-color
              terraform validate -no-color
            )
          done
