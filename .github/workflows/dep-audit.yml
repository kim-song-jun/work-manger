name: dep-audit

# Weekly dependency vulnerability scan (operations-guide.md §8.3).
# - Backend (pip-audit) on services/api
# - Frontend (npm audit) on apps/web + apps/desktop
# - Mobile (flutter pub audit) on apps/mobile if Flutter SDK action available
# Any HIGH/CRITICAL CVE → opens a GitHub issue with the `security` label.

on:
  schedule:
    - cron: "0 2 * * 1" # 매주 월요일 02:00 UTC (= 한국 시간 11:00)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # ── Backend (pip-audit) ───────────────────────────────────────────────────
  backend:
    name: pip-audit (services/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit==2.7.3

      - name: Run pip-audit (JSON)
        id: audit
        working-directory: services/api
        run: |
          set +e
          pip-audit -r requirements.txt --format json --output pip-audit.json
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # rc 1 = vulnerabilities found; we still upload the report and let the
          # filter step decide whether to open an issue.
          exit 0

      - name: Filter HIGH/CRITICAL CVEs
        id: filter
        working-directory: services/api
        run: |
          python - <<'PY'
          import json, os, pathlib
          report = json.loads(pathlib.Path("pip-audit.json").read_text() or "{}")
          deps = report.get("dependencies", report) if isinstance(report, dict) else []
          hits = []
          for dep in deps if isinstance(deps, list) else []:
              for v in dep.get("vulns", []):
                  sev = (v.get("severity") or v.get("aliases", [""])[0] or "").upper()
                  if "CRITICAL" in sev or "HIGH" in sev:
                      hits.append(f"- **{dep.get('name')}@{dep.get('version')}** — {v.get('id')} ({sev})")
          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          if hits:
              body = "Backend (pip-audit) HIGH/CRITICAL CVEs:\n\n" + "\n".join(hits)
              with out.open("a") as f:
                  f.write("hits=true\n")
                  # Use a delimiter for multi-line output.
                  f.write("body<<__END__\n" + body + "\n__END__\n")
          else:
              with out.open("a") as f:
                  f.write("hits=false\n")
          PY

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: services/api/pip-audit.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Open issue on HIGH/CRITICAL CVE
        if: steps.filter.outputs.hits == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.filter.outputs.body }}\n\n_Source: \`pip-audit\` workflow run ${context.runId}_`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[security] pip-audit: HIGH/CRITICAL CVE — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ["security", "dependencies", "backend"],
            });

  # ── Frontend web (npm audit) ──────────────────────────────────────────────
  web:
    name: npm audit (apps/web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: npm audit (moderate+)
        id: audit
        working-directory: apps/web
        run: |
          set +e
          npm audit --audit-level=moderate --json > npm-audit.json
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Filter HIGH/CRITICAL CVEs
        id: filter
        working-directory: apps/web
        run: |
          node -e '
            const fs = require("fs");
            const r = JSON.parse(fs.readFileSync("npm-audit.json","utf8") || "{}");
            const meta = r.metadata && r.metadata.vulnerabilities || {};
            const high = (meta.high || 0) + (meta.critical || 0);
            const out = process.env.GITHUB_OUTPUT;
            if (high > 0) {
              const body = `Frontend (apps/web) npm audit\n\n- high: ${meta.high || 0}\n- critical: ${meta.critical || 0}\n\nRun \`npm audit\` locally for details.`;
              fs.appendFileSync(out, "hits=true\nbody<<__END__\n" + body + "\n__END__\n");
            } else {
              fs.appendFileSync(out, "hits=false\n");
            }
          '

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-web
          path: apps/web/npm-audit.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Open issue on HIGH/CRITICAL CVE
        if: steps.filter.outputs.hits == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.filter.outputs.body }}\n\n_Source: \`npm audit\` (apps/web) workflow run ${context.runId}_`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[security] npm audit (web): HIGH/CRITICAL — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ["security", "dependencies", "frontend"],
            });

  # ── Frontend desktop (npm audit) ──────────────────────────────────────────
  desktop:
    name: npm audit (apps/desktop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: npm audit (moderate+)
        id: audit
        working-directory: apps/desktop
        run: |
          set +e
          npm audit --audit-level=moderate --json > npm-audit.json
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Filter HIGH/CRITICAL CVEs
        id: filter
        working-directory: apps/desktop
        run: |
          node -e '
            const fs = require("fs");
            const r = JSON.parse(fs.readFileSync("npm-audit.json","utf8") || "{}");
            const meta = r.metadata && r.metadata.vulnerabilities || {};
            const high = (meta.high || 0) + (meta.critical || 0);
            const out = process.env.GITHUB_OUTPUT;
            if (high > 0) {
              const body = `Desktop (apps/desktop) npm audit\n\n- high: ${meta.high || 0}\n- critical: ${meta.critical || 0}`;
              fs.appendFileSync(out, "hits=true\nbody<<__END__\n" + body + "\n__END__\n");
            } else {
              fs.appendFileSync(out, "hits=false\n");
            }
          '

      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-desktop
          path: apps/desktop/npm-audit.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Open issue on HIGH/CRITICAL CVE
        if: steps.filter.outputs.hits == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.filter.outputs.body }}\n\n_Source: \`npm audit\` (apps/desktop) workflow run ${context.runId}_`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[security] npm audit (desktop): HIGH/CRITICAL — ${new Date().toISOString().slice(0,10)}`,
              body,
              labels: ["security", "dependencies", "desktop"],
            });

  # ── Mobile (Flutter pub audit) ────────────────────────────────────────────
  mobile:
    name: flutter pub audit (apps/mobile)
    runs-on: ubuntu-latest
    # 모바일 디렉토리가 없거나 SDK 가 실패해도 다른 잡을 막지 않도록 fail-fast 끔.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check apps/mobile exists
        id: check
        run: |
          if [ -f apps/mobile/pubspec.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "[skip] apps/mobile/pubspec.yaml not found"
          fi

      - name: Set up Flutter
        if: steps.check.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable

      - name: flutter pub get
        if: steps.check.outputs.exists == 'true'
        working-directory: apps/mobile
        run: flutter pub get

      - name: flutter pub audit
        if: steps.check.outputs.exists == 'true'
        id: audit
        working-directory: apps/mobile
        run: |
          set +e
          # `flutter pub audit` (newer) — fall back to `outdated` if absent.
          if flutter pub audit --help >/dev/null 2>&1; then
            flutter pub audit > pub-audit.txt 2>&1
          else
            flutter pub outdated --mode=null-safety > pub-audit.txt 2>&1
          fi
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Heuristic: any line containing "HIGH", "CRITICAL", "CVE-" → flag.
          if grep -qiE "HIGH|CRITICAL|CVE-" pub-audit.txt; then
            echo "hits=true" >> "$GITHUB_OUTPUT"
          else
            echo "hits=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload pub-audit report
        if: steps.check.outputs.exists == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-pub-audit
          path: apps/mobile/pub-audit.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Open issue on HIGH/CRITICAL CVE
        if: steps.audit.outputs.hits == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[security] flutter pub audit: HIGH/CRITICAL — ${new Date().toISOString().slice(0,10)}`,
              body: `Mobile (apps/mobile) flutter pub audit found HIGH/CRITICAL findings.\n\n_See artifact \`flutter-pub-audit\` (workflow run ${context.runId})._`,
              labels: ["security", "dependencies", "mobile"],
            });
