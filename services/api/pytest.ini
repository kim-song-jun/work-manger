[pytest]
DJANGO_SETTINGS_MODULE = work_manager.settings.test
python_files = tests.py test_*.py *_tests.py
addopts = -ra --strict-markers
asyncio_mode = strict
# Coverage 임계값은 docs/guidelines/testing-standards.md §4 단계별 정책을 따른다.
# Phase 0 현재: lines >= 50% (CI 게이트). 로컬 실행 시에는 --no-cov 로 끌 수 있다.
# 사용 예: pytest --cov=apps --cov=core --cov-report=term-missing --cov-fail-under=50
markers =
    unit: 순수 유닛 테스트 (외부 의존 없음, 1ms~10ms)
    integration: 통합 테스트 (실제 Postgres / Redis 사용)
    slow: 1초 이상 소요 (CI 만 실행 등)
