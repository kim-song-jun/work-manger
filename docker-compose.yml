name: work-manager

networks:
  wm-net:
    driver: bridge
    name: wm-net

volumes:
  pg-data:
  redis-data:
  ntfy-data:

services:
  db:
    image: postgres:16-alpine
    container_name: wm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: work_manager
      POSTGRES_USER: wm
      POSTGRES_PASSWORD: wm
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [wm-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wm -d work_manager"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port — db is internal-only

  redis:
    image: redis:7-alpine
    container_name: wm-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks: [wm-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    # No host port — redis is internal-only

  ntfy:
    # Self-hosted push for the Android native client. The Flutter shell
    # opens a WebSocket to this server (proxied via nginx /v1/ntfy/) and
    # the BE publishes per-membership topics from real_push fan-out.
    # See ADR-006 + docs/operations/operations-guide.md §5.4.
    image: binwiederhier/ntfy:v2.10.0
    container_name: wm-ntfy
    restart: unless-stopped
    command: ["serve"]
    environment:
      NTFY_BASE_URL: http://ntfy:80
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_CACHE_DURATION: 24h
    volumes:
      - ntfy-data:/var/lib/ntfy
    networks: [wm-net]
    # No host port — nginx proxies /v1/ntfy/ → ntfy:80

  api:
    build:
      context: ./services/api
    container_name: wm-api
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.dev
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:4444,http://127.0.0.1:4444
      DJANGO_CREATE_SUPERUSER: "1"
      DJANGO_SUPERUSER_EMAIL: admin@molcube.com
      DJANGO_SUPERUSER_PASSWORD: admin1234!
    entrypoint: ["bash", "/app/entrypoint.sh"]
    command: ["gunicorn", "work_manager.wsgi:application", "--bind", "0.0.0.0:4455", "--workers", "3", "--access-logfile", "-"]
    ports:
      - "4455:4455"
    networks: [wm-net]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4455/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  ws:
    build:
      context: ./services/api
    container_name: wm-ws
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      api: { condition: service_started }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.dev
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["daphne", "-b", "0.0.0.0", "-p", "4456", "work_manager.asgi:application"]
    networks: [wm-net]
    # No host port — internal-only; nginx (web) proxies /v1/ws/ → ws:4456

  worker:
    build:
      context: ./services/api
    container_name: wm-worker
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.dev
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["celery", "-A", "work_manager", "worker", "-l", "info"]
    networks: [wm-net]

  beat:
    build:
      context: ./services/api
    container_name: wm-beat
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.dev
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["celery", "-A", "work_manager", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    networks: [wm-net]

  seed:
    # One-shot demo seeder. Run with:
    #   docker compose run --rm seed
    # Idempotent — re-running wipes the demo company first, then re-seeds.
    build:
      context: ./services/api
    profiles: ["seed"]
    depends_on:
      api: { condition: service_started }
      db: { condition: service_healthy }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.dev
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      REDIS_URL: redis://redis:6379/1
    entrypoint: []
    command: ["python", "manage.py", "seed_demo"]
    networks: [wm-net]

  web:
    build:
      context: ./apps/web
      target: dev
    container_name: wm-web
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      API_PROXY_TARGET: http://api:4455
      WS_PROXY_TARGET: http://ws:4456
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command:
      - sh
      - -lc
      - |
        set -e
        npm ci --no-audit --no-fund
        npm run dev
    ports:
      - "4444:4444"
    networks: [wm-net]

  api-test:
    build:
      context: ./services/api
    profiles: ["test"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DJANGO_SETTINGS_MODULE: work_manager.settings.test
      DJANGO_SECRET_KEY: dev-insecure-change-me
      DATABASE_URL: postgres://wm:wm@db:5432/work_manager
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/1
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: ["pytest", "--ds=work_manager.settings.test", "-q"]
    networks: [wm-net]

  web-test:
    build:
      context: ./apps/web
      target: dev
    profiles: ["test"]
    command:
      - sh
      - -lc
      - |
        set -e
        npm run typecheck
        npm run test
        npm run build
    networks: [wm-net]

  desktop-test:
    image: node:24-bookworm-slim
    profiles: ["test"]
    working_dir: /app
    environment:
      CI: "1"
    volumes:
      - ./apps/desktop:/app
      - /app/node_modules
      - /root/.cache/electron
      - /root/.cache/electron-builder
    command:
      - bash
      - -lc
      - |
        set -e
        npm ci --no-audit --no-fund
        npm run typecheck
        npm run test
    networks: [wm-net]

  mobile-test:
    image: ghcr.io/cirruslabs/flutter:3.24.5
    profiles: ["test"]
    working_dir: /app
    environment:
      CI: "1"
      PUB_CACHE: /pub-cache
    volumes:
      - ./apps/mobile:/app
      - /pub-cache
    command:
      - bash
      - -lc
      - |
        set -e
        flutter pub get
        flutter test
    networks: [wm-net]

  desktop-package:
    image: node:24-bookworm-slim
    profiles: ["package"]
    working_dir: /app
    environment:
      CI: "1"
    volumes:
      - ./apps/desktop:/app
      - /app/node_modules
      - /root/.cache/electron
      - /root/.cache/electron-builder
    command:
      - bash
      - -lc
      - |
        set -e
        npm ci --no-audit --no-fund
        npm run build:ts
        npx electron-builder --linux dir --publish=never -c.electronDist=./node_modules/electron/dist
    networks: [wm-net]

  mobile-package:
    image: ghcr.io/cirruslabs/flutter:3.24.5
    profiles: ["package"]
    working_dir: /app
    environment:
      CI: "1"
      PUB_CACHE: /pub-cache
    volumes:
      - ./apps/mobile:/app
      - /pub-cache
    command:
      - bash
      - -lc
      - |
        set -e
        flutter pub get
        flutter build apk --debug
    networks: [wm-net]

  storybook:
    build:
      context: ./apps/web
      target: dev
    container_name: wm-storybook
    restart: unless-stopped
    profiles: ["dev-tools"]   # opt-in: docker compose --profile dev-tools up
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command:
      - sh
      - -lc
      - |
        set -e
        npm ci --no-audit --no-fund
        npm run storybook
    ports:
      - "6006:6006"
    networks: [wm-net]

  e2e:
    # Playwright end-to-end runner. Run with:
    #   docker compose --profile e2e run --rm e2e
    # Prereq: stack must be up (api healthy, web reachable) and the demo
    # company must be seeded (`docker compose run --rm seed`).
    #
    image: mcr.microsoft.com/playwright:v1.49.1-jammy
    profiles: ["e2e"]
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
      ws:  { condition: service_started }
    environment:
      API_URL: http://api:4455
      CI: "1"
      E2E_SKIP_SEED: "1"   # CI/operator runs `seed` separately
      WM_E2E_PROXY_TARGET: http://web:4444
    working_dir: /e2e
    volumes:
      - ./apps/e2e:/e2e
      - /e2e/node_modules
    command:
      - bash
      - -lc
      - |
        set -e
        export BASE_URL="$${BASE_URL:-http://localhost:4444}"
        echo "[e2e] BASE_URL=$$BASE_URL"
        npm ci --no-audit --no-fund
        node scripts/local-web-proxy.mjs &
        proxy_pid="$$!"
        trap 'kill "$$proxy_pid" 2>/dev/null || true' EXIT
        for i in $$(seq 1 50); do
          node -e "fetch(process.env.BASE_URL).then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))" && break
          if [ "$$i" = "50" ]; then
            echo "[e2e] local web proxy did not become ready"
            exit 1
          fi
          sleep 0.2
        done
        exec npx playwright test
    networks: [wm-net]
